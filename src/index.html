<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>21点 - 四人同屏</title>
<style>
  #loading-screen {
    position: fixed; left: 0; top: 0; width: 100vw; height: 100vh;
    background: #072e14; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  }
  .loading #game-root,
  .loading #confirm-overlay { display: none !important; }
</style>
</head>
<body class="loading">
<div id="loading-screen">
  <div class="loading-box">
    <div class="loading-title">21点</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">正在加载资源... 0%</div>
  </div>
</div>
<div id="game-root" style="display:none;">
  <div id="game-board" class="felt-bg">
    <div class="region region-yi" id="yi" data-player="yi">
      <span class="score" id="score-yi">0</span>
      <div class="top-area">
        <div class="hint" id="hint-yi"></div>
      </div>
      <div class="cards-area" id="cards-yi">
        <div class="hand-value" id="hand-value-yi"></div>
        <div class="waiting-text">请稍候</div>
      </div>
      <div class="bottom-area">
        <span class="name">乙</span>
        <div class="ops-area" id="ops-yi">
          <button class="btn primary" data-action="seat" data-pid="yi">落座</button>
        </div>
      </div>
    </div>

    <div class="region region-bing" id="bing" data-player="bing">
      <span class="score" id="score-bing">0</span>
      <div class="top-area">
        <div class="hint" id="hint-bing"></div>
      </div>
      <div class="cards-area" id="cards-bing">
        <div class="hand-value" id="hand-value-bing"></div>
        <div class="waiting-text">请稍候</div>
      </div>
      <div class="bottom-area">
        <span class="name">丙</span>
        <div class="ops-area" id="ops-bing">
          <button class="btn primary" data-action="seat" data-pid="bing">落座</button>
        </div>
      </div>
    </div>

    <div class="region region-jia" id="jia" data-player="jia">
      <span class="score" id="score-jia">0</span>
      <span class="dealer-tag">庄家</span>
      <div class="top-area">
        <div class="hint" id="hint-jia"></div>
      </div>
      <div class="cards-area" id="cards-jia">
        <div class="hand-value" id="hand-value-jia"></div>
      </div>
      <div class="bottom-area">
        <span class="name">甲</span>
        <div class="ops-area" id="ops-jia">
          <button class="btn danger" data-action="reset">重置</button>
        </div>
      </div>
    </div>

    <div class="region region-ding" id="ding" data-player="ding">
      <span class="score" id="score-ding">0</span>
      <div class="top-area">
        <div class="hint" id="hint-ding"></div>
      </div>
      <div class="cards-area" id="cards-ding">
        <div class="hand-value" id="hand-value-ding"></div>
        <div class="waiting-text">请稍候</div>
      </div>
      <div class="bottom-area">
        <span class="name">丁</span>
        <div class="ops-area" id="ops-ding">
          <button class="btn primary" data-action="seat" data-pid="ding">落座</button>
        </div>
      </div>
    </div>
  </div>

  <div id="deck-area">
    <div class="deck-stack">
      <div class="deck-card"></div>
      <div class="deck-card"></div>
      <div class="deck-card"></div>
    </div>
    <div class="deck-count" id="deck-count">52</div>
  </div>
</div>

<div id="confirm-overlay" class="confirm-overlay hidden">
  <div class="confirm-dialog">
    <p class="confirm-text">确定要重置所有玩家的积分为 0 吗？</p>
    <div class="confirm-buttons">
      <button class="btn danger" data-action="confirm-reset">确定</button>
      <button class="btn secondary" data-action="cancel-reset">取消</button>
    </div>
  </div>
</div>
</body>
</html>
